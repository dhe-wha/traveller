<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pemesanan Tiket, Hotel dan Mobil</title>
<link rel="icon" type="image/png" href="Travel.png">
<style>
  :root{
    --primary:#1e5f8c;
    --primary-dark:#154564;
    --accent:#f5a623;
    --bg:#f4f6f8;
    --card:#ffffff;
    --border:#e1e5ea;
    --text:#2b2f36;
    --muted:#7a8290;
    --success:#2e9e5b;
    --warn:#e0a300;
    --danger:#d64545;
    --info:#3b7dd8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
  }
  header{
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:#fff;
    padding:18px 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
    position:sticky;
    top:0;
    z-index:200;
  }
  header h1{
    margin:0;
    font-size:20px;
    font-weight:600;
  }
  header .subtitle{
    font-size:12px;
    opacity:.85;
    margin-top:2px;
  }
  .role-switch{
    display:flex;
    background:rgba(255,255,255,.15);
    border-radius:8px;
    padding:4px;
    gap:4px;
  }
  .role-switch button{
    border:none;
    background:transparent;
    color:#fff;
    padding:8px 16px;
    border-radius:6px;
    cursor:pointer;
    font-size:13px;
    font-weight:600;
  }
  .role-switch button.active{
    background:#fff;
    color:var(--primary-dark);
  }
  main{
    max-width:100%;
    margin:0;
    padding:20px 24px;
  }
  .view{display:none;}
  .view.active{display:block;}
  .freeze-panel{
    position:sticky;
    top:var(--header-h, 80px);
    z-index:150;
  }
  .freeze-panel-2{
    position:sticky;
    z-index:140;
    /* top diatur lewat JS (updateStickyOffsets), tergantung tinggi elemen di atasnya */
  }
  .modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(20,30,40,.5);
    z-index:500;
    align-items:flex-start;
    justify-content:center;
    overflow-y:auto;
    padding:40px 20px;
  }
  .modal-overlay.show{display:flex;}
  .modal-box{
    background:var(--card);
    border-radius:12px;
    max-width:960px;
    width:100%;
    padding:24px;
    box-shadow:0 10px 40px rgba(0,0,0,.25);
  }
  .modal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
    border-bottom:2px solid var(--border);
    padding-bottom:10px;
  }
  .modal-header h2{
    margin:0;
    font-size:16px;
    color:var(--primary-dark);
  }
  .modal-close{
    background:none;
    border:none;
    font-size:26px;
    line-height:1;
    color:var(--muted);
    cursor:pointer;
    padding:0 4px;
  }
  .modal-close:hover{color:var(--danger);}
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:20px;
    margin-bottom:20px;
  }
  .card h2{
    margin:0 0 16px 0;
    font-size:16px;
    color:var(--primary-dark);
    border-bottom:2px solid var(--border);
    padding-bottom:10px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:14px;
  }
  .field{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .field label{
    font-size:12px;
    font-weight:600;
    color:var(--muted);
  }
  .field input, .field select, .field textarea{
    padding:9px 10px;
    border:1px solid var(--border);
    border-radius:6px;
    font-size:13px;
    font-family:inherit;
    background:#fff;
  }
  .field textarea{resize:vertical;min-height:44px;}
  .field.full{grid-column:1/-1;}
  .radio-group{
    display:flex;
    gap:16px;
    padding-top:6px;
  }
  .radio-group label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    font-weight:500;
    color:var(--text);
  }
  .jenis-fields{
    display:none;
    grid-column:1/-1;
    padding-top:6px;
    border-top:1px dashed var(--border);
    margin-top:6px;
  }
  .jenis-fields.show{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
  .jenis-badge{
    display:inline-block;
    font-size:11px;
    font-weight:700;
    padding:2px 8px;
    border-radius:20px;
    color:#fff;
  }
  .jenis-tiket{background:var(--info);}
  .jenis-hotel{background:#7a5cd6;}
  .jenis-mobil{background:#3fa55f;}
  .btn{
    border:none;
    padding:10px 20px;
    border-radius:6px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
  }
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-sm{padding:5px 10px;font-size:12px;border-radius:5px;}
  .btn-success{background:var(--success);color:#fff;}
  .btn-warn{background:var(--warn);color:#fff;}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-info{background:var(--info);color:#fff;}
  .btn-muted{background:#eef0f2;color:var(--text);}
  .actions-row{margin-top:16px;display:flex;justify-content:flex-end;gap:10px;}
  table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
  }
  th, td{
    text-align:left;
    padding:10px 8px;
    border-bottom:1px solid var(--border);
    vertical-align:top;
  }
  th{
    background:#f0f3f6;
    color:var(--muted);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.03em;
  }
  tr:hover td{background:#fafbfc;}
  .status-pill{
    display:inline-block;
    font-size:11px;
    font-weight:700;
    padding:3px 10px;
    border-radius:20px;
    color:#fff;
    white-space:nowrap;
  }
  .status-Menunggu{background:var(--warn);}
  .status-Diproses{background:var(--info);}
  .status-Selesai{background:var(--success);}
  .status-Ditolak{background:var(--danger);}
  .filters{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:14px;
  }
  .filters select, .filters input{
    padding:8px 10px;
    border:1px solid var(--border);
    border-radius:6px;
    font-size:13px;
  }
  .stat-cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:12px;
    margin-bottom:20px;
  }
  .stat-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px 16px;
    text-align:center;
  }
  .stat-card .num{font-size:24px;font-weight:700;color:var(--primary-dark);}
  .stat-card .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;margin-top:2px;}
  .empty-state{
    text-align:center;
    padding:30px;
    color:var(--muted);
    font-size:13px;
  }
  .detail-line{font-size:12px;color:var(--muted);margin-top:2px;}
  .detail-line b{color:var(--text);}
  select.status-select{
    border:1px solid var(--border);
    border-radius:5px;
    padding:5px 6px;
    font-size:12px;
  }
  .action-cell{display:flex;flex-direction:column;gap:6px;min-width:110px;}
  .toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:var(--success);
    color:#fff;
    padding:12px 18px;
    border-radius:8px;
    font-size:13px;
    font-weight:600;
    box-shadow:0 4px 14px rgba(0,0,0,.15);
    opacity:0;
    transform:translateY(10px);
    transition:.25s;
    pointer-events:none;
    z-index:999;
  }
  .toast.show{opacity:1;transform:translateY(0);}

  @media(max-width:600px){
    header{flex-direction:column;align-items:flex-start;}
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Pemesanan Tiket, Hotel dan Mobil</h1>
    <div class="subtitle">Head Office &amp; Site</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <button id="btnTambahPermintaan" type="button" class="btn btn-primary" onclick="openOrderModal()">+ Tambah Permintaan</button>
    <div class="role-switch">
      <button id="btnSiteRole" class="active" onclick="switchRole('site')">Site (Pemesan)</button>
      <button id="btnHORole" onclick="switchRole('ho')">Travel HO</button>
    </div>
  </div>
</header>

<main>

  <!-- ================= SITE VIEW ================= -->
  <div id="viewSite" class="view active">
    <div class="card freeze-panel" id="siteListTopbar">
      <h2>Daftar Pesanan
        <button type="button" class="btn btn-sm btn-muted" style="float:right;" onclick="loadOrdersFromSheet(true)">Muat Ulang</button>
      </h2>
      <div class="filters">
        <input type="text" id="siteFilterSite" placeholder="Filter Departemen/Site..." oninput="renderSiteTable()">
        <select id="siteFilterJenis" onchange="renderSiteTable()">
          <option value="">Semua Jenis</option>
          <option value="tiket">Tiket</option>
          <option value="hotel">Hotel</option>
          <option value="mobil">Travel Mobil</option>
        </select>
        <select id="siteFilterStatus" onchange="renderSiteTable()">
          <option value="">Semua Status</option>
          <option value="Menunggu">Menunggu</option>
          <option value="Diproses">Diproses</option>
          <option value="Selesai">Selesai</option>
          <option value="Ditolak">Ditolak</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div id="siteTableWrap"></div>
    </div>
  </div>

  <!-- ================= HO VIEW ================= -->
  <div id="viewHO" class="view">
    <div class="stat-cards freeze-panel" id="statCards"></div>

    <div class="card freeze-panel-2" id="hoListTopbar">
      <h2>Semua Permintaan Pemesanan (Travel HO)
        <button type="button" class="btn btn-sm btn-muted" style="float:right;" onclick="loadOrdersFromSheet(true)">Muat Ulang</button>
      </h2>
      <div class="filters">
        <input type="text" id="hoFilterSite" placeholder="Cari departemen/site..." oninput="renderHOTable()">
        <select id="hoFilterJenis" onchange="renderHOTable()">
          <option value="">Semua Jenis</option>
          <option value="tiket">Tiket</option>
          <option value="hotel">Hotel</option>
          <option value="mobil">Travel Mobil</option>
        </select>
        <select id="hoFilterStatus" onchange="renderHOTable()">
          <option value="">Semua Status</option>
          <option value="Menunggu">Menunggu</option>
          <option value="Diproses">Diproses</option>
          <option value="Selesai">Selesai</option>
          <option value="Ditolak">Ditolak</option>
        </select>
        <select id="hoFilterPrioritas" onchange="renderHOTable()">
          <option value="">Semua Prioritas</option>
          <option value="Normal">Normal</option>
          <option value="Urgent">Urgent</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div id="hoTableWrap"></div>
    </div>
  </div>

</main>

<!-- ================= MODAL: FORM PERMINTAAN PEMESANAN ================= -->
<div class="modal-overlay" id="orderModalOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <h2>Form Permintaan Pemesanan</h2>
      <button type="button" class="modal-close" onclick="closeOrderModal()">&times;</button>
    </div>
    <form id="orderForm" onsubmit="submitOrder(event)">
      <div class="grid">
        <div class="field">
          <label>Nama Lengkap Pemesan *</label>
          <input type="text" id="f_pemohon" placeholder="Nama lengkap pemohon" required>
        </div>
        <div class="field">
          <label>Departemen / Divisi (Site) *</label>
          <input type="text" id="f_site" placeholder="Contoh: Site Balikpapan" required>
        </div>
        <div class="field">
          <label>Jenis Pemesanan *</label>
          <select id="f_jenis" onchange="toggleJenisFields()" required>
            <option value="">-- Pilih Jenis --</option>
            <option value="tiket">Tiket Pesawat</option>
            <option value="hotel">Hotel</option>
            <option value="mobil">Travel Mobil</option>
          </select>
        </div>
        <div class="field">
          <label>Prioritas *</label>
          <select id="f_prioritas" required>
            <option value="Normal">Normal</option>
            <option value="Urgent">Urgent</option>
          </select>
        </div>

        <!-- TIKET FIELDS (mengikuti Form Permohonan Tiket Pesawat) -->
        <div class="jenis-fields" id="fields_tiket">
          <div class="field">
            <label>Nama Penerbangan *</label>
            <select id="t_namapenerbangan" class="airline-dropdown" required><option value="">-- Pilih Maskapai --</option></select>
          </div>
          <div class="field">
            <label>Dari *</label>
            <select id="t_dari" class="loc-dropdown" required><option value="">-- Pilih Lokasi --</option></select>
          </div>
          <div class="field">
            <label>Tujuan *</label>
            <select id="t_tujuan" class="loc-dropdown" required><option value="">-- Pilih Lokasi --</option></select>
          </div>
          <div class="field">
            <label>Tanggal Penerbangan *</label>
            <input type="date" id="t_tanggal" required>
          </div>
          <div class="field full">
            <label>Keperluan *</label>
            <textarea id="t_keperluan" placeholder="Keperluan perjalanan dinas" required></textarea>
          </div>
        </div>

        <!-- HOTEL FIELDS (mengikuti Form Permohonan Reservasi Hotel) -->
        <div class="jenis-fields" id="fields_hotel">
          <div class="field">
            <label>Lokasi Pemesanan *</label>
            <select id="h_lokasi" class="loc-dropdown" required><option value="">-- Pilih Lokasi --</option></select>
          </div>
          <div class="field">
            <label>Nama Hotel *</label>
            <input type="text" id="h_namahotel" placeholder="Contoh: Hotel Aston Balikpapan" required>
          </div>
          <div class="field">
            <label>Tanggal Check-in *</label>
            <input type="date" id="h_checkin" required>
          </div>
          <div class="field">
            <label>Tanggal Check-out *</label>
            <input type="date" id="h_checkout" required>
          </div>
          <div class="field full">
            <label>Pilihan Tipe Kamar</label>
            <div class="radio-group">
              <label><input type="radio" name="h_tipe" value="Standard Room" checked> Standard Room</label>
              <label><input type="radio" name="h_tipe" value="Deluxe Room"> Deluxe Room</label>
            </div>
          </div>
        </div>

        <!-- MOBIL FIELDS -->
        <div class="jenis-fields" id="fields_mobil">
          <div class="field">
            <label>Dari *</label>
            <select id="m_dari" class="loc-dropdown" required><option value="">-- Pilih Lokasi --</option></select>
          </div>
          <div class="field">
            <label>Tujuan *</label>
            <select id="m_tujuan" class="loc-dropdown" required><option value="">-- Pilih Lokasi --</option></select>
          </div>
          <div class="field">
            <label>Tanggal *</label>
            <input type="date" id="m_tanggal" required>
          </div>
          <div class="field">
            <label>Jam Penjemputan *</label>
            <input type="time" id="m_jam" required>
          </div>
          <div class="field">
            <label>Jenis Mobil *</label>
            <select id="m_jenismobil" class="vehicle-dropdown" required><option value="">-- Pilih Kendaraan --</option></select>
          </div>
          <div class="field full">
            <label>Keperluan *</label>
            <textarea id="m_keperluan" placeholder="Keperluan perjalanan" required></textarea>
          </div>
        </div>

        <div class="field full">
          <label>Catatan Tambahan</label>
          <textarea id="f_catatan" placeholder="Informasi tambahan jika ada"></textarea>
        </div>
      </div>

      <div class="actions-row">
        <button type="reset" class="btn btn-muted" onclick="toggleJenisFields()">Reset</button>
        <button type="submit" class="btn btn-primary">Kirim Permintaan</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<input type="file" id="globalFileInput" style="display:none" onchange="handleFileSelected(event)">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  const STORAGE_KEY = 'travelOrders_v1';
  const GAS_URL_KEY = 'gasWebAppUrl';
  const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbzxBWWm0TegowiZ36ttecMLu0_5kdNW9natBJWjIpYjadTT2hxMFzkBNHOXPblK8U5Q/exec';
  let orders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

  function save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
  }

  function getGasUrl(){
    const stored = localStorage.getItem(GAS_URL_KEY);
    return (stored !== null && stored !== '') ? stored : DEFAULT_GAS_URL;
  }

  function jenisCodeFromLabel(label){
    if(label === 'Tiket Pesawat') return 'tiket';
    if(label === 'Hotel') return 'hotel';
    return 'mobil';
  }

  // Ubah satu order (bentuk internal app) jadi payload flat sesuai kolom Sheet.
  function buildSheetPayload(order, action){
    const d = order.detail || {};
    return {
      action: action,
      id: order.id,
      tanggal: order.tanggal,
      site: order.site,
      pemohon: order.pemohon,
      jenis: jenisLabel(order.jenis),
      prioritas: order.prioritas,
      status: order.status,
      namapenerbangan: order.jenis==='tiket' ? d.namapenerbangan : '',
      darilokasi: order.jenis==='tiket' ? d.dari : (order.jenis==='hotel' ? d.lokasi : (order.jenis==='mobil' ? d.dari : '')),
      ke: order.jenis==='tiket' ? d.tujuan : (order.jenis==='mobil' ? d.tujuan : ''),
      tanggalpenerbangan: order.jenis==='tiket' ? d.tanggal : '',
      keperluantiket: order.jenis==='tiket' ? d.keperluan : '',
      namahotel: order.jenis==='hotel' ? d.namahotel : '',
      checkin: order.jenis==='hotel' ? d.checkin : '',
      checkout: order.jenis==='hotel' ? d.checkout : '',
      tipekamar: order.jenis==='hotel' ? d.tipe : '',
      rutemobil: '',
      tanggalmobil: order.jenis==='mobil' ? d.tanggal : '',
      jammobil: order.jenis==='mobil' ? d.jam : '',
      jenismobil: order.jenis==='mobil' ? d.jenismobil : '',
      keperluanmobil: order.jenis==='mobil' ? d.keperluan : '',
      catatan: order.catatan,
      catatanho: order.catatanHO
    };
  }

  // Ubah 1 baris hasil GET dari Sheet jadi bentuk order internal app.
  function rowToOrder(row){
    const jenisCode = jenisCodeFromLabel(row.jenis);
    let detail = {};
    if(jenisCode === 'tiket'){
      detail = { namapenerbangan: row.namapenerbangan, dari: row.darilokasi, tujuan: row.ke, tanggal: row.tanggalpenerbangan, keperluan: row.keperluantiket };
    } else if(jenisCode === 'hotel'){
      detail = { lokasi: row.darilokasi, namahotel: row.namahotel, checkin: row.checkin, checkout: row.checkout, tipe: row.tipekamar };
    } else {
      detail = { dari: row.darilokasi || '', tujuan: row.ke || '', tanggal: row.tanggalmobil, jam: row.jammobil, jenismobil: row.jenismobil, keperluan: row.keperluanmobil };
    }
    return {
      id: row.id,
      tanggal: row.tanggal,
      site: row.site,
      pemohon: row.pemohon,
      jenis: jenisCode,
      prioritas: row.prioritas,
      status: row.status || 'Menunggu',
      catatan: row.catatan || '',
      catatanHO: row.catatanho || '',
      pemesananUrl: row.pemesanan || '',
      tiketVoucherUrl: row.tiketvoucher || '',
      detail: detail
    };
  }

  // Kirim satu aksi (create/updateStatus/delete/uploadFile) ke Apps Script Web App.
  // Body dikirim sebagai string biasa (bukan JSON header) supaya jadi "simple
  // request" tanpa preflight OPTIONS. TIDAK pakai mode 'no-cors' lagi, supaya
  // kita bisa baca hasil sebenarnya dari server (sukses/gagal + pesan error),
  // bukan cuma asumsi berhasil begitu request terkirim.
  async function postToSheet(payload){
    const url = getGasUrl();
    if(!url) return { ok:false, error:'URL Apps Script belum diatur.' };
    try {
      const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
      const json = await res.json();
      if(json && json.result === 'success'){
        return { ok:true, data: json };
      }
      return { ok:false, error: (json && json.error) ? json.error : 'Respons tidak dikenali dari server.' };
    } catch(err){
      console.error(err);
      return { ok:false, error: err.message || String(err) };
    }
  }

  // Muat ulang seluruh daftar pesanan langsung dari Google Sheet (sumber data utama).
  async function loadOrdersFromSheet(showErrorToast){
    const url = getGasUrl();
    if(!url) return;
    try {
      const sep = url.includes('?') ? '&' : '?';
      const res = await fetch(url + sep + 'action=list');
      const json = await res.json();
      if(json && json.result === 'success' && Array.isArray(json.data)){
        orders = json.data.map(rowToOrder);
        save(); // cache lokal sebagai cadangan kalau offline
        renderSiteTable();
        renderHOTable();
      }
    } catch(err){
      console.error(err);
      if(showErrorToast) showToast('Gagal memuat data dari Google Sheet.', true);
    }
  }

  // Ambil daftar lokasi dari sheet "F" (lewat Apps Script) dan isi ke semua dropdown lokasi.
  async function loadLocations(){
    const url = getGasUrl();
    if(!url) return;
    try {

  // Ukur tinggi tiap panel yang di-freeze (sticky) dan atur posisi "top" panel
  // serta header tabel (thead) di bawahnya secara presisi, supaya freeze-nya
  // menempel pas berurutan: header > (stat cards, khusus HO) > judul+filter > kolom tabel.
  function applyTheadSticky(wrapId, topPx){
    document.querySelectorAll('#'+wrapId+' thead th').forEach(th=>{
      th.style.position = 'sticky';
      th.style.top = topPx + 'px';
      th.style.zIndex = 60;
    });
  }

  function updateStickyOffsets(){
    const headerEl = document.querySelector('header');
    const headerH = headerEl ? headerEl.offsetHeight : 80;
    document.documentElement.style.setProperty('--header-h', headerH + 'px');

    // Site: topbar (freeze-panel) langsung di bawah header, lalu thead di bawah topbar.
    const siteTopbar = document.getElementById('siteListTopbar');
    const siteTopbarH = siteTopbar ? siteTopbar.offsetHeight : 0;
    applyTheadSticky('siteTableWrap', headerH + siteTopbarH);

    // HO: stat cards (freeze-panel) di bawah header, lalu topbar (freeze-panel-2), lalu thead.
    const statCards = document.getElementById('statCards');
    const statCardsH = statCards ? statCards.offsetHeight : 0;
    const hoTopbar = document.getElementById('hoListTopbar');
    const hoTopbarTop = headerH + statCardsH;
    if(hoTopbar) hoTopbar.style.top = hoTopbarTop + 'px';
    const hoTopbarH = hoTopbar ? hoTopbar.offsetHeight : 0;
    applyTheadSticky('hoTableWrap', hoTopbarTop + hoTopbarH);
  }
  window.addEventListener('resize', updateStickyOffsets);

  function toggleJenisFields(){
    const val = document.getElementById('f_jenis').value;
    ['tiket','hotel','mobil'].forEach(j=>{
      const group = document.getElementById('fields_'+j);
      const isActive = j===val;
      group.classList.toggle('show', isActive);
      // Field yang disembunyikan (display:none) tetap dianggap "required" oleh
      // browser saat validasi form, sehingga tombol Kirim Permintaan seolah tidak
      // bereaksi (validasi gagal di field tersembunyi yang tidak bisa difokuskan).
      // Solusinya: nonaktifkan field pada grup yang tidak aktif supaya dikecualikan
      // dari validasi, lalu aktifkan lagi saat grupnya dipilih.
      group.querySelectorAll('input,select,textarea').forEach(el=>{
        el.disabled = !isActive;
      });
    });
  }

  function fmtDate(d){
    if(!d) return '-';
    const dt = new Date(d);
    if(isNaN(dt)) return d;
    return dt.toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'});
  }

  function buildDetail(jenis){
    if(jenis==='tiket'){
      return {
        namapenerbangan: document.getElementById('t_namapenerbangan').value,
        dari: document.getElementById('t_dari').value,
        tujuan: document.getElementById('t_tujuan').value,
        tanggal: document.getElementById('t_tanggal').value,
        keperluan: document.getElementById('t_keperluan').value
      };
    }
    if(jenis==='hotel'){
      const tipeEl = document.querySelector('input[name="h_tipe"]:checked');
      return {
        lokasi: document.getElementById('h_lokasi').value,
        namahotel: document.getElementById('h_namahotel').value,
        checkin: document.getElementById('h_checkin').value,
        checkout: document.getElementById('h_checkout').value,
        tipe: tipeEl ? tipeEl.value : 'Standard Room'
      };
    }
    if(jenis==='mobil'){
      return {
        dari: document.getElementById('m_dari').value,
        tujuan: document.getElementById('m_tujuan').value,
        tanggal: document.getElementById('m_tanggal').value,
        jam: document.getElementById('m_jam').value,
        jenismobil: document.getElementById('m_jenismobil').value,
        keperluan: document.getElementById('m_keperluan').value
      };
    }
    return {};
  }

  // Ikon vektor generik (bukan logo maskapai/merk mobil asli) supaya aman dari
  // hak cipta/merek dagang dan tidak butuh file gambar eksternal.
  function airlineColor(name){
    const n = (name||'').toLowerCase();
    if(n.includes('garuda')) return '#1a4d8f';
    if(n.includes('batik')) return '#8e1537';
    if(n.includes('lion')) return '#e2231a';
    if(n.includes('citilink')) return '#00a651';
    if(n.includes('super air jet') || n.includes('superairjet')) return '#f7941e';
    if(n.includes('wings')) return '#0072bc';
    if(n.includes('sriwijaya')) return '#f37021';
    if(n.includes('nam air') || n.includes('namair')) return '#8dc63f';
    if(n.includes('trans nusa') || n.includes('transnusa')) return '#00aeef';
    if(n.includes('pelita')) return '#662d91';
    return '#2563eb';
  }

  function iconPlane(name){
    const c = airlineColor(name);
    return `<svg width="16" height="16" viewBox="0 0 24 24" style="flex:none;"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2.5 1.5V22l4-1 4 1v-1.5L13 19v-5.5l8 2.5z" fill="${c}"/></svg>`;
  }

  function iconHotel(){
    return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="flex:none;"><path d="M3 21V7a1 1 0 0 1 1-1h4V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2h4a1 1 0 0 1 1 1v14M3 21h18M7 21v-4a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v4M9 9h2M13 9h2M9 13h2M13 13h2" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }

  function iconCar(jenisMobil){
    const j = (jenisMobil||'').toLowerCase();
    const c = '#059669';
    if(j.includes('pickup')){
      return `<svg width="18" height="16" viewBox="0 0 24 24" fill="none" style="flex:none;"><path d="M2 15h1.2l0.8-4h6v4h9.5l1.5-3.2V15h1" stroke="${c}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><circle cx="5" cy="15.5" r="1.6" stroke="${c}" stroke-width="1.4"/><circle cx="17" cy="15.5" r="1.6" stroke="${c}" stroke-width="1.4"/></svg>`;
    }
    if(j.includes('hiace')){
      return `<svg width="18" height="16" viewBox="0 0 24 24" fill="none" style="flex:none;"><rect x="2" y="5.5" width="17" height="9" rx="1.3" stroke="${c}" stroke-width="1.5"/><path d="M19 9h2l1 1.8V14.5h-3" stroke="${c}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="5.5" cy="15.5" r="1.6" stroke="${c}" stroke-width="1.4"/><circle cx="16.5" cy="15.5" r="1.6" stroke="${c}" stroke-width="1.4"/></svg>`;

    if(j.includes('innova')){
      return `<svg width="18" height="16" viewBox="0 0 24 24" fill="none" style="flex:none;"><path d="M3 13.5l1.3-4.3a1.8 1.8 0 0 1 1.7-1.2h10a1.8 1.8 0 0 1 1.7 1.2l1.3 4.3" stroke="${c}" stroke-width="1.5" stroke-linejoin="round"/><path d="M2 13.5h20v1.6H2z" stroke="${c}" stroke-width="1.4"/><circle cx="5.5" cy="15.3" r="1.6" stroke="${c}" stroke-width="1.4"/><circle cx="17.5" cy="15.3" r="1.6" stroke="${c}" stroke-width="1.4"/></svg>`;
    }
    // default: Avanza / MPV / lainnya
    return `<svg width="18" height="16" viewBox="0 0 24 24" fill="none" style="flex:none;"><path d="M4 13.5l1-3.6a1.6 1.6 0 0 1 1.5-1.1h10a1.6 1.6 0 0 1 1.5 1.1l1 3.6" stroke="${c}" stroke-width="1.5" stroke-linejoin="round"/><path d="M2.5 13.5h19v1.6h-19z" stroke="${c}" stroke-width="1.4"/><circle cx="5.5" cy="15.2" r="1.5" stroke="${c}" stroke-width="1.4"/><circle cx="17" cy="15.2" r="1.5" stroke="${c}" stroke-width="1.4"/></svg>`;

  function detailSummary(order){
    const d = order.detail;
    if(order.jenis==='tiket'){
      return `<div class="detail-line" style="display:flex;align-items:center;gap:5px;"><b style="display:flex;align-items:center;gap:5px;">${iconPlane(d.namapenerbangan)}${d.namapenerbangan||'-'}</b></div>
              <div class="detail-line">${d.dari||'-'} &rarr; ${d.tujuan||'-'}</div>`;
    }
    if(order.jenis==='hotel'){
      return `<div class="detail-line" style="display:flex;align-items:center;gap:5px;"><b style="display:flex;align-items:center;gap:5px;">${iconHotel()}${d.namahotel||'-'}</b></div>
              <div class="detail-line">Lokasi: ${d.lokasi||'-'}</div>
              <div class="detail-line">Check-in: ${fmtDate(d.checkin)} | Check-out: ${fmtDate(d.checkout)}</div>
              <div class="detail-line">Tipe: ${d.tipe||'-'}</div>`;
    }
    if(order.jenis==='mobil'){
      return `<div class="detail-line">${d.dari||'-'} &rarr; ${d.tujuan||'-'}</div>
              <div class="detail-line" style="display:flex;align-items:center;gap:5px;">${iconCar(d.jenismobil)}Mobil: ${d.jenismobil||'-'} ${d.jam ? '| Jam '+d.jam : ''}</div>`;
    }
    return '';
  }

  // Tanggal utama ("keberangkatan") per jenis pemesanan, ditampilkan di kolom tersendiri.
  function tglBerangkat(order){
    const d = order.detail;
    if(order.jenis==='tiket') return fmtDate(d.tanggal);
    if(order.jenis==='hotel') return fmtDate(d.checkin);
    if(order.jenis==='mobil') return fmtDate(d.tanggal);
    return '-';
  }

  // Gabungan Keperluan + Catatan, ditampilkan di kolom "Catatan" tersendiri.
  function catatanColumn(order){
    const d = order.detail;
    const parts = [];
    if(d.keperluan) parts.push('<div class="detail-line">Keperluan: '+d.keperluan+'</div>');
    if(order.catatan) parts.push('<div class="detail-line">Catatan: '+order.catatan+'</div>');
    return parts.length ? parts.join('') : '-';
  }

  async function submitOrder(e){
    e.preventDefault();
    const jenis = document.getElementById('f_jenis').value;
    if(!jenis){ showToast('Pilih jenis pemesanan terlebih dahulu', true); return; }

    const order = {
      id: Date.now(),
      tanggal: new Date().toISOString(),
      site: document.getElementById('f_site').value,
      pemohon: document.getElementById('f_pemohon').value,
      jenis: jenis,
      prioritas: document.getElementById('f_prioritas').value,
      catatan: document.getElementById('f_catatan').value,
      detail: buildDetail(jenis),
      status: 'Menunggu',
      catatanHO: ''
    };

    const submitBtn = document.querySelector('#orderForm button[type="submit"]');
    if(submitBtn) submitBtn.disabled = true;
    const result = await postToSheet(buildSheetPayload(order, 'create'));
    if(submitBtn) submitBtn.disabled = false;

    document.getElementById('orderForm').reset();
    toggleJenisFields();

    if(result.ok){
      showToast('Permintaan berhasil dikirim!');
      closeOrderModal();
      await loadOrdersFromSheet(true);
    } else {
      showToast('Gagal mengirim ke Google Sheet: ' + result.error, true);
    }
  }

  function showToast(msg, isError){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = isError ? 'var(--danger)' : 'var(--success)';
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2500);
  }

  function filteredOrders(scope){
    let list = [...orders];
    if(scope==='site'){
      const site = document.getElementById('siteFilterSite').value.trim().toLowerCase();
      const jenis = document.getElementById('siteFilterJenis').value;
      const status = document.getElementById('siteFilterStatus').value;
      if(site) list = list.filter(o=>o.site.toLowerCase().includes(site));
      if(jenis) list = list.filter(o=>o.jenis===jenis);
      if(status) list = list.filter(o=>o.status===status);
    } else {
      const site = document.getElementById('hoFilterSite').value.trim().toLowerCase();
      const jenis = document.getElementById('hoFilterJenis').value;
      const status = document.getElementById('hoFilterStatus').value;
      const prioritas = document.getElementById('hoFilterPrioritas').value;
      if(site) list = list.filter(o=>o.site.toLowerCase().includes(site));
      if(jenis) list = list.filter(o=>o.jenis===jenis);
      if(status) list = list.filter(o=>o.status===status);
      if(prioritas) list = list.filter(o=>o.prioritas===prioritas);
    }
    return list;
  }

  function renderSiteTable(){
    const wrap = document.getElementById('siteTableWrap');
    const list = filteredOrders('site');
    if(list.length===0){
      wrap.innerHTML = '<div class="empty-state">Belum ada pesanan.</div>';
      updateStickyOffsets();
      return;
    }
    let html = `<table><thead><tr>
      <th>Tanggal Request</th><th>Departemen/Site</th><th>Pemesan</th><th>Jenis</th><th>Tgl Berangkat</th><th>Detail</th><th>Catatan</th><th>Prioritas</th><th>Status</th><th>Aksi</th>
      </tr></thead><tbody>`;
    list.forEach(o=>{
      html += `<tr>
        <td>${fmtDate(o.tanggal)}</td>
        <td>${o.site}</td>
        <td>${o.pemohon}</td>
        <td><span class="jenis-badge ${jenisBadgeClass(o.jenis)}">${jenisLabel(o.jenis)}</span></td>
        <td>${tglBerangkat(o)}</td>
        <td>${detailSummary(o)}</td>
        <td>${catatanColumn(o)}</td>
        <td>${o.prioritas}</td>
        <td><span class="status-pill status-${o.status}">${o.status}</span></td>
        <td>${
          (o.status === 'Selesai' && o.tiketVoucherUrl)
            ? `<a class="btn btn-sm btn-success" href="${o.tiketVoucherUrl}" target="_blank" rel="noopener">Unduh Tiket/Voucher</a>`
            : `<button class="btn btn-sm btn-info" onclick="downloadPDF(${o.id})">Lihat PDF</button>`
        }</td>
      </tr>`;
    });
    html += '</tbody></table>';
    wrap.innerHTML = html;
    updateStickyOffsets();
  }

  function renderStats(){
    const total = orders.length;
    const menunggu = orders.filter(o=>o.status==='Menunggu').length;
    const diproses = orders.filter(o=>o.status==='Diproses').length;
    const selesai = orders.filter(o=>o.status==='Selesai').length;
    const ditolak = orders.filter(o=>o.status==='Ditolak').length;
    document.getElementById('statCards').innerHTML = `
      <div class="stat-card"><div class="num">${total}</div><div class="lbl">Total Pesanan</div></div>
      <div class="stat-card"><div class="num">${menunggu}</div><div class="lbl">Menunggu</div></div>
      <div class="stat-card"><div class="num">${diproses}</div><div class="lbl">Diproses</div></div>
      <div class="stat-card"><div class="num">${selesai}</div><div class="lbl">Selesai</div></div>
      <div class="stat-card"><div class="num">${ditolak}</div><div class="lbl">Ditolak</div></div>
    `;
  }

  function renderHOTable(){
    renderStats();
    const wrap = document.getElementById('hoTableWrap');
    const list = filteredOrders('ho');
    if(list.length===0){
      wrap.innerHTML = '<div class="empty-state">Belum ada pesanan.</div>';
      updateStickyOffsets();
      return;
    }
    let html = `<table><thead><tr>
      <th>Tanggal Request</th><th>Departemen/Site</th><th>Pemesan</th><th>Jenis</th><th>Tgl Berangkat</th><th>Detail</th><th>Catatan</th><th>Prioritas</th><th>Status</th><th>Aksi</th>
      </tr></thead><tbody>`;
    list.forEach(o=>{
      // Travel Mobil tidak punya file (Pemesanan/Tiket-Voucher sudah dihapus dari
      // alurnya), jadi cukup dikunci begitu status dipilih "Selesai". Tiket/Hotel
      // tetap dikunci berdasar status "Selesai" + Tiket/Voucher sudah diupload.
      const locked = o.jenis === 'mobil'
        ? o.status === 'Selesai'
        : (o.status === 'Selesai' && !!(o.pemesananUrl || o.tiketVoucherUrl));
      const statusCell = locked
        ? `<span class="status-pill status-${o.status}">${o.status}</span>
           <div class="detail-line">${o.jenis === 'mobil' ? 'Status ditutup (Selesai)' : 'Status terkunci (sudah ada file)'}</div>`
        : `<span class="status-pill status-${o.status}">${o.status}</span><br>
           <select class="status-select" onchange="updateStatus(${o.id}, this.value)">
             <option value="Menunggu" ${o.status==='Menunggu'?'selected':''}>Menunggu</option>
             <option value="Diproses" ${o.status==='Diproses'?'selected':''}>Diproses</option>
             <option value="Selesai" ${o.status==='Selesai'?'selected':''}>Selesai</option>
             <option value="Ditolak" ${o.status==='Ditolak'?'selected':''}>Ditolak</option>
           </select>`;

      // Travel Mobil tidak butuh Tiket/Voucher (tidak ada tiket untuk mobil), jadi tombolnya disembunyikan.
      const tiketCell = o.jenis === 'mobil'
        ? ''
        : (o.tiketVoucherUrl
          ? `<a href="${o.tiketVoucherUrl}" target="_blank" rel="noopener" class="btn btn-sm btn-muted">Lihat Tiket/Voucher</a>`
          : `<button class="btn btn-sm btn-warn" onclick="promptUpload(${o.id},'tiketvoucher')">Upload Tiket/Voucher</button>`);

      // Kalau sudah "selesai" (Mobil) atau Tiket/Voucher sudah diupload (Tiket/Hotel),
      // tombol Unduh PDF dan Hapus tidak perlu tampil lagi.
      const fullyUploaded = o.jenis === 'mobil' ? (o.status === 'Selesai') : !!(o.pemesananUrl && o.tiketVoucherUrl);
      const pdfAndDeleteCell = fullyUploaded ? '' : `
          <button class="btn btn-sm btn-info" onclick="downloadPDF(${o.id})">Unduh PDF</button>
          <button class="btn btn-sm btn-danger" onclick="deleteOrder(${o.id})">Hapus</button>`;

      html += `<tr>
        <td>${fmtDate(o.tanggal)}</td>
        <td>${o.site}</td>
        <td>${o.pemohon}</td>
        <td><span class="jenis-badge ${jenisBadgeClass(o.jenis)}">${jenisLabel(o.jenis)}</span></td>
        <td>${tglBerangkat(o)}</td>
        <td>${detailSummary(o)}</td>
        <td>${catatanColumn(o)}</td>
        <td>${o.prioritas}</td>
        <td>${statusCell}</td>
        <td class="action-cell">
          ${pdfAndDeleteCell}
          ${tiketCell}
        </td>
      </tr>`;
    });
    html += '</tbody></table>';
    wrap.innerHTML = html;
    updateStickyOffsets();
  }

  async function updateStatus(id, status){
    const o = orders.find(x=>x.id===id);
    if(!o) return;
    const prevStatus = o.status;
    o.status = status; // update optimis di tampilan
    renderHOTable();
    renderSiteTable();
    const result = await postToSheet({ action:'updateStatus', id: String(id), status: status, catatanho: o.catatanHO || '' });
    if(result.ok){
      showToast('Status diperbarui: '+status);
      await loadOrdersFromSheet();
    } else {
      o.status = prevStatus; // rollback kalau gagal
      renderHOTable();
      renderSiteTable();
      showToast('Gagal update status: ' + result.error, true);
    }
  }

  // ===== Upload Pemesanan / Tiket-Voucher ke Google Drive (lewat Apps Script) =====
  let pendingUploadId = null;
  let pendingUploadType = null;

  function promptUpload(id, fileType){
    pendingUploadId = id;
    pendingUploadType = fileType;
    document.getElementById('globalFileInput').click();
  }

  function handleFileSelected(e){
    const file = e.target.files[0];
    e.target.value = ''; // reset supaya file yang sama bisa dipilih lagi nanti
    if(!file || !pendingUploadId || !pendingUploadType) return;
    const id = pendingUploadId;
    const fileType = pendingUploadType;
    const reader = new FileReader();
    reader.onload = function(){
      const base64 = String(reader.result).split(',')[1] || '';
      doUploadFile(id, fileType, file.name, file.type, base64);
    };
    reader.onerror = function(){
      showToast('Gagal membaca file.', true);
    };
    reader.readAsDataURL(file);
  }

  async function doUploadFile(id, fileType, filename, mimeType, base64){
    const label = fileType === 'pemesanan' ? 'Pemesanan' : 'Tiket/Voucher';
    showToast(`Mengupload ${label}...`);
    const result = await postToSheet({
      action: 'uploadFile',
      id: String(id),
      fileType: fileType,
      filename: filename,
      mimeType: mimeType || 'application/octet-stream',
      base64: base64
    });
    if(result.ok){
      showToast(`${label} berhasil diupload.`);
      await loadOrdersFromSheet();
    } else {
      showToast(`Gagal upload ${label}: ${result.error}`, true);
    }
  }

  async function deleteOrder(id){
    if(!confirm('Hapus pesanan ini?')) return;
    const result = await postToSheet({ action:'delete', id: String(id) });
    if(result.ok){
      showToast('Pesanan dihapus.');
      await loadOrdersFromSheet();
    } else {
      showToast('Gagal menghapus: ' + result.error, true);
    }
  }

  // ===== Unduh PDF (layout mengikuti formulir PDF asli) =====
  function downloadPDF(id){
    const o = orders.find(x=>x.id===id);
    if(!o) return;
    if(!window.jspdf){ showToast('Library PDF belum siap, coba lagi sebentar.', true); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit:'pt', format:'a4' });
    const left = 56;
    const labelX = left + 16;
    const colonX = left + 200;
    const valueX = left + 214;
    let y = 70;

    let title;
    if(o.jenis==='tiket') title = 'FORMULIR PERMOHONAN TIKET PESAWAT';
    else if(o.jenis==='hotel') title = 'FORMULIR PERMOHONAN RESERVASI HOTEL';
    else title = 'FORMULIR PERMOHONAN TRAVEL MOBIL';

    doc.setFont('helvetica','bold');
    doc.setFontSize(15);
    doc.text(title, left, y);
    y += 20;

    doc.setFont('helvetica','italic');
    doc.setFontSize(10.5);
    doc.text('Mohon isi detail di bawah ini secara lengkap untuk keperluan administrasi.', left, y);
    y += 26;

    function sectionTitle(text){
      doc.setFont('helvetica','bold');
      doc.setFontSize(12);
      doc.text(text, left, y);
      y += 20;
    }
    function bulletRow(label, value){
      doc.setFont('helvetica','bold');
      doc.setFontSize(10.5);
      doc.text('-', labelX, y);
      doc.text(label, labelX + 12, y);
      doc.text(':', colonX, y);
      doc.setFont('helvetica','normal');
      doc.text(String(value || ''), valueX, y);
      // garis isian bawah teks (jika kosong tetap tampilkan garis)
      const lineY = y + 3;
      doc.setDrawColor(0);
      doc.line(valueX, lineY, 500, lineY);
      y += 22;
    }
    function checklistRow(label, checked){
      doc.setFont('helvetica','normal');
      doc.setFontSize(10.5);
      doc.text(`[ ${checked ? 'X' : ' '} ] ${label}`, labelX, y);
      y += 18;
    }

    sectionTitle('1. Informasi Pemesan');
    bulletRow('Nama Lengkap Pemesan', o.pemohon);
    bulletRow('Departemen / Divisi', o.site);
    y += 6;

    sectionTitle('2. Detail Reservasi');
    const d = o.detail;
    if(o.jenis==='tiket'){
      bulletRow('Nama Penerbangan', d.namapenerbangan);
      bulletRow('Rute', `${d.dari || ''} - ${d.tujuan || ''}`);
      bulletRow('Tanggal Penerbangan', fmtDate(d.tanggal));
      bulletRow('Keperluan', d.keperluan);
    } else if(o.jenis==='hotel'){
      bulletRow('Lokasi Pemesanan', d.lokasi);
      bulletRow('Nama Hotel', d.namahotel);
      bulletRow('Tanggal Check-in', fmtDate(d.checkin));
      bulletRow('Tanggal Check-out', fmtDate(d.checkout));
      y += 6;
      doc.setFont('helvetica','bolditalic');
      doc.setFontSize(11);
      doc.text('3. Pilihan Tipe Kamar (Silakan centang [X] salah satu)', left, y);
      y += 20;
      checklistRow('Standard Room', d.tipe === 'Standard Room');
      checklistRow('Deluxe Room', d.tipe === 'Deluxe Room');
    } else {
      bulletRow('Rute', `${d.dari || ''} - ${d.tujuan || ''}`);
      bulletRow('Tanggal', fmtDate(d.tanggal));
      bulletRow('Jam Penjemputan', d.jam);
      bulletRow('Jenis Mobil', d.jenismobil);
      bulletRow('Keperluan', d.keperluan);
    }

    y += 18;
    sectionTitle('Persetujuan & Otorisasi');
    doc.setFont('helvetica','normal');
    doc.setFontSize(10.5);
    doc.text('Formulir ini dibuat dengan sebenar-benarnya untuk dapat dipergunakan sebagaimana', left, y);
    y += 14;
    doc.text('mestinya.', left, y);
    y += 60;

    doc.setFont('helvetica','bold');
    doc.setFontSize(11);
    const leftLabel = 'Tanda tangan pemesan';
    const rightLabel = 'Diketahui';
    doc.text(leftLabel, left, y);
    doc.text(rightLabel, left + 280, y);
    const leftCenterX = left + doc.getTextWidth(leftLabel) / 2;
    const rightCenterX = left + 280 + doc.getTextWidth(rightLabel) / 2;
    y += 86;

    doc.setFont('helvetica','normal');
    doc.text(`(  ${o.pemohon || ''}  )`, leftCenterX, y, { align: 'center' });
    doc.text('(                          )', rightCenterX, y, { align: 'center' });

    // Buka sebagai preview di tab baru (viewer PDF bawaan browser), bukan langsung
    // download — supaya tidak menuhi folder Download. Kalau memang perlu file PDF-nya,
    // user tinggal Print > Save as PDF dari viewer tersebut.
    const blobUrl = doc.output('bloburl');
    window.open(blobUrl, '_blank');
  }

  // init
  document.getElementById('btnTambahPermintaan').style.display = 'inline-flex'; // default: role Site aktif
  toggleJenisFields();
  renderSiteTable();
  renderHOTable();
  updateStickyOffsets();
  loadOrdersFromSheet(); // muat data terkini dari Google Sheet saat halaman dibuka
  loadLocations(); // muat daftar lokasi (dropdown Dari/Tujuan/Lokasi) dari sheet "F"
  loadVehicles(); // muat daftar jenis kendaraan (dropdown Jenis Mobil) dari sheet "F" kolom B
  loadAirlines(); // muat daftar maskapai (dropdown Nama Penerbangan) dari sheet "F" kolom C
</script>
